<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Villa</title>
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons for the specific icon styles in the image -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <img src="../background.png" alt="Vibe Villa Background" class="bg-img">
        
        <div class="overlay-container">
            <div class="content-container">
                <div class="logo-container">
                    <img src="../logo vibevilla.png" alt="Vibe Villa Logo" class="logo">
                </div>
                
                <div class="typography-section">
                    <div class="script-container">
                        <div class="script-large">Where connections</div>
                        <div class="script-small">feel like a getaway</div>
                    </div>
                </div>
                
                <div class="spacer"></div>
                
                <div class="buttons-container">
                    <button class="btn btn-primary" aria-label="Enter VibeVilla">
                        <i class="ph ph-house"></i>
                        ENTER VIBEVILLA
                    </button>
                    
                    <button class="btn btn-secondary btn-audience" aria-label="Join as Audience">
                        <i class="ph ph-users"></i>
                        <div class="btn-text-group">
                            <span class="btn-title">JOIN AS AUDIENCE</span>
                            <span class="btn-subtitle">Watch. Vote. Support.</span>
                        </div>
                    </button>
                </div>
                
                <div class="footer-heart">
                    <i class="ph-fill ph-heart"></i>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
